
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f0f5fb">
<title>Gnoke Station</title>
  <<script src="sys2026/auth.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#f0f5fb; --surface:#ffffff; --surface2:#f7fafd; --surface3:#edf2f9;
  --blue-1:#86b4e4; --blue-2:#3f6e9b; --blue-3:#1F4765;
  --blue-light:rgba(134,180,228,0.12); --blue-mid:rgba(63,110,155,0.10);
  --live:#0e9f6e; --live-bg:rgba(14,159,110,0.08); --live-border:rgba(14,159,110,0.25);
  --dead:#dc2626; --dead-bg:rgba(220,38,38,0.07);
  --cap:#7c3aed; --cap-bg:rgba(124,58,237,0.07); --cap-border:rgba(124,58,237,0.22);
  --text:#1a2e44; --text-2:#4a6480; --text-3:#8aa3bc;
  --border:#d8e6f2; --border-2:#c4d8ed;
  --shadow-sm:0 1px 3px rgba(31,71,101,0.08),0 1px 2px rgba(31,71,101,0.04);
  --shadow-md:0 4px 12px rgba(31,71,101,0.10),0 2px 4px rgba(31,71,101,0.06);
  --shadow-lg:0 12px 32px rgba(31,71,101,0.14),0 4px 8px rgba(31,71,101,0.08);
  --mono:'DM Mono',monospace; --display:'Outfit',sans-serif;
  --tb-h:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{height:100%;background:var(--bg);color:var(--text);font-family:var(--display);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:24px 24px;opacity:0.6;pointer-events:none;z-index:0;}
.shell{display:grid;grid-template-rows:var(--tb-h) 1fr;height:100vh;height:100dvh;position:relative;z-index:1;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:200;position:relative;}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;user-select:none;}
.tb-hex{width:32px;height:32px;background:linear-gradient(135deg,var(--blue-1),var(--blue-2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;box-shadow:0 2px 6px rgba(63,110,155,0.3);flex-shrink:0;}
.tb-wordmark{font-family:var(--display);font-weight:800;font-size:15px;color:var(--blue-3);letter-spacing:-0.02em;line-height:1;}
.tb-wordmark span{font-weight:400;color:var(--text-3);font-size:11px;display:block;letter-spacing:0.05em;}
.tb-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.tb-spacer{flex:1;}
.bus-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text-2);letter-spacing:0.06em;text-transform:uppercase;transition:all 0.3s;}
.bus-pill.live {border-color:var(--live-border);background:var(--live-bg);color:var(--live);}
.bus-pill.error{border-color:rgba(220,38,38,0.3);background:var(--dead-bg);color:var(--dead);}
.bus-dot{width:7px;height:7px;border-radius:50%;background:var(--text-3);flex-shrink:0;transition:background 0.3s;}
.bus-pill.live  .bus-dot{background:var(--live);box-shadow:0 0 0 2px rgba(14,159,110,0.2);animation:livePulse 2s ease-in-out infinite;}
.bus-pill.error .bus-dot{background:var(--dead);}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.45}}
.tb-clock{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text-2);letter-spacing:0.04em;min-width:44px;text-align:right;}
.tb-debug{all:unset;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text-2);padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);transition:all 0.15s;letter-spacing:0.04em;}
.tb-debug:hover{border-color:var(--blue-1);color:var(--blue-2);background:var(--blue-light);}
@media(max-width:640px){.bus-pill span{display:none;}.bus-pill{padding:4px 7px;}}
.launcher{display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
.panel-bar{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.panel-title{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-2);flex:1;}
.ph-btn{all:unset;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--blue-2);padding:4px 10px;border:1px solid var(--blue-1);border-radius:6px;background:var(--blue-light);transition:all 0.15s;letter-spacing:0.04em;}
.ph-btn:hover{background:var(--blue-mid);border-color:var(--blue-2);}
.ph-btn:active{transform:scale(0.97);}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface2);}
.search-input{all:unset;width:100%;font-family:var(--display);font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border-2);padding:8px 12px;border-radius:8px;transition:border-color 0.15s,box-shadow 0.15s;}
.search-input:focus{border-color:var(--blue-1);box-shadow:0 0 0 3px rgba(134,180,228,0.2);outline:none;}
.search-input::placeholder{color:var(--text-3);}
.app-scroll{flex:1;overflow-y:auto;padding:0;}
.cat-block{margin-bottom:2px;}
.cat-label{padding:14px 16px 8px;font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-3);user-select:none;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color 0.13s;}
.cat-label:hover{color:var(--text-2);}
.cat-label .cl-chev{margin-left:auto;font-size:9px;color:var(--text-3);transition:transform 0.2s;}
.cat-label.open .cl-chev{transform:rotate(90deg);}
.cat-apps{display:none;}
.cat-apps.open{display:grid;grid-template-columns:repeat(var(--grid-cols,3),1fr);gap:2px;padding:0 10px 14px;}
.app-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px 6px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all 0.13s;text-align:center;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.app-tile:hover {background:var(--blue-light);border-color:var(--border);}
.app-tile:active{background:var(--blue-mid);transform:scale(0.95);}
.app-tile.privileged:hover{background:var(--cap-bg);border-color:var(--cap-border);}
.app-tile.launching{animation:tileFlash 0.5s ease;}
@keyframes tileFlash{0%{background:rgba(14,159,110,0.25)}100%{background:transparent}}
.app-tile .live-dot{display:none;position:absolute;top:7px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 0 2px var(--surface);}
.app-tile.running .live-dot{display:block;}
.at-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--surface3),var(--blue-light));border:1px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:var(--shadow-sm);transition:all 0.13s;}
.app-tile.privileged .at-icon{background:linear-gradient(135deg,var(--cap-bg),rgba(124,58,237,0.12));border-color:var(--cap-border);}
.app-tile:hover .at-icon{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.at-name{font-family:var(--display);font-size:11px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(240,245,251,0.85);backdrop-filter:blur(4px);z-index:400;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border-2);border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;gap:16px;animation:modalIn 0.2s ease;position:relative;overflow:hidden;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blue-1),var(--blue-2));border-radius:16px 16px 0 0;}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-family:var(--display);font-size:16px;font-weight:700;color:var(--text);margin-top:4px;}
.field label{display:block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-2);margin-bottom:6px;}
.field input{all:unset;width:100%;font-family:var(--display);font-size:14px;color:var(--text);background:var(--surface2);border:1px solid var(--border-2);padding:10px 14px;border-radius:10px;transition:all 0.15s;}
.field input:focus{border-color:var(--blue-1);box-shadow:0 0 0 3px rgba(134,180,228,0.2);outline:none;background:var(--surface);}
.field input::placeholder{color:var(--text-3);}
.modal-actions{display:flex;gap:8px;}
.m-btn{all:unset;font-family:var(--display);font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;cursor:pointer;border:1px solid var(--border-2);color:var(--text-2);background:var(--surface2);transition:all 0.15s;text-align:center;-webkit-tap-highlight-color:transparent;flex:1;min-height:44px;display:flex;align-items:center;justify-content:center;}
.m-btn:hover{border-color:var(--border);color:var(--text);}
.m-btn:active{transform:scale(0.97);}
.m-btn.primary{background:linear-gradient(135deg,var(--blue-1),var(--blue-2));color:white;border-color:transparent;box-shadow:0 2px 8px rgba(63,110,155,0.3);}
.m-btn.primary:hover{box-shadow:0 4px 12px rgba(63,110,155,0.4);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--blue-1);}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="tb-logo">
      <div class="tb-hex">⬡</div>
      <div class="tb-wordmark">Gnoke<span>Station v2</span></div>
    </div>
    <div class="tb-sep"></div>
    <div class="bus-pill" id="busPill">
      <div class="bus-dot"></div>
      <span id="busLabel">Connecting</span>
    </div>
    <div class="tb-spacer"></div>
    <button class="tb-debug" onclick="window.open('/system/debug/index.html','gnoke-debug')">Debug ◈</button>
    <div class="tb-sep"></div>
    <div class="tb-clock" id="tbClock">--:--</div>
  </header>
  <div class="launcher">
    <div class="search-wrap" style="position:relative">
      <input class="search-input" id="appSearch" type="text" placeholder="Search apps…" autocomplete="off" autocorrect="off" style="padding-right:36px"/>
      <button class="ph-btn" id="btnCustom" title="Add App" style="position:absolute;right:18px;top:50%;transform:translateY(-50%);padding:2px 7px;font-size:16px;line-height:1;border:none;background:none;color:var(--text-3);cursor:pointer">+</button>
    </div>
    <div class="app-scroll" id="appScroll"></div>
  </div>
</div>
<div class="modal-bg" id="customModal">
  <div class="modal">
    <div class="modal-title">Add App</div>
    <div class="field">
      <label>App URL</label>
      <input type="url" id="customUrl" placeholder="https://yourapp.com"/>
      <div style="margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--text-3)">Paste any URL — station checks for a Gnoke manifest</div>
    </div>
    <div class="modal-actions">
      <button class="m-btn" id="customCancel">Cancel</button>
      <button class="m-btn primary" id="customSpawn">Add App →</button>
    </div>
  </div>
</div>
<script src="sys2026/apps.js"></script>
<script src="sys2026/launcher.js"></script>
</body>
</html>
